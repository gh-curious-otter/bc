name: Feature Request
description: Suggest a new feature, improvement, or epic
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see in bc. Use size to indicate scope — large features automatically become epics.

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What problem does this solve? What should the end state look like?
      placeholder: "e.g. 'Agents should be able to communicate via shared channels without polling'"
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Any technical constraints, compatibility requirements, or non-goals.
      placeholder: "e.g. 'Must work with both tmux and Docker runtimes'"

  - type: textarea
    id: sub-issues
    attributes:
      label: Sub-Issues (for medium/large/xlarge)
      description: Break down into sub-issues if this is larger than a single PR. Link issues as created.
      value: |
        <!-- Delete this section for quick/small issues -->
        - [ ] #000 -- Description
        - [ ] #000 -- Description

  - type: textarea
    id: references
    attributes:
      label: References
      description: Related files, packages, prior art, documentation, or linked issues.

  - type: dropdown
    id: size
    attributes:
      label: Estimated Size
      description: Determines the workflow. Each size decomposes into the next.
      options:
        - "Quick (< 100 LOC, trivial change)"
        - "Small (< 200 LOC, single PR)"
        - "Medium (2-5 PRs, decomposes into Small)"
        - "Large (needs design doc, decomposes into Medium)"
        - "XLarge (needs scoping, decomposes into Large)"
    validations:
      required: true

  - type: textarea
    id: done-when
    attributes:
      label: Done When
      description: Acceptance criteria.
      value: |
        - [ ] Feature implemented with tests
        - [ ] `make ci-local` passes
        - [ ] PR reviewed and merged
    validations:
      required: true

  - type: textarea
    id: agent-instructions
    attributes:
      label: Agent Instructions
      description: |
        Recursive workflow for agents. You may leave this as-is.
      value: |
        <details>
        <summary>Agent Workflow (click to expand)</summary>

        ### Recursive Decomposition (each level → next level down)

        **QUICK** — < 100 LOC, trivial change
        - Branch, implement, `make ci-local` (MUST PASS), PR, review, merge.
        - No subagents needed.

        **SMALL** — < 200 LOC, single PR
        - Branch: `feat/<issue-number>-<short-desc>`
        - Implement and test (target: 1-5 files, < 200 LOC)
        - `make ci-local` as background task
        - Open PR → review → ci-local pass → merge, fail → fix and repeat
        - **Escalation**: if scope exceeds 200 LOC or 5 files, STOP and re-classify as Medium

        **MEDIUM** — 2-5 PRs, decomposes into Small
        - Break into max 5 todos with dependency order
        - Assign each todo to a subagent (each follows Small workflow)
        - Serialize dependent work, parallelize independent work
        - Merge in dependency order
        - **Reconciliation**: after all merges, verify integrated state

        **LARGE** — needs design doc, decomposes into Medium
        - Phase 1: Use 5 subagents to review codebase, related PRs, issues
        - Phase 2: Use 5 subagents to research internet for related information
        - Phase 3: Write crisp design doc as GitHub comment
        - Phase 4: Get approval (STUCK until approved)
        - Phase 5: Break into max 5 Medium sub-issues → each follows Medium workflow
        - **Context chain**: every sub-issue carries parent's design reasoning

        **XLARGE** — needs scoping, decomposes into Large
        - Do not implement directly
        - Use 10 agents to research codebase and internet
        - Post findings as GitHub comment
        - Break into max 5 Large sub-issues with clear scope
        - Each Large sub-issue follows Large workflow

        ### Guardrails

        - **Max fan-out**: 5 sub-issues per decomposition level
        - **Max depth**: 3 levels (XLARGE → Large → Medium → Small)
        - **Max retries**: 3 fix attempts per CI failure, then escalate
        - **Escalation**: any agent can promote a task (Small→Medium, Medium→Large) if scope exceeds expectations. STOP and notify parent.
        - **Cross-cutting**: changes touching shared interfaces (API types, config structs) must be serialized, not parallelized
        - **Timeouts**: Research 30min, Design 1hr, Small implementation 2hr

        ### Key Commands

        ```bash
        make ci-local                       # Full CI pipeline (MUST PASS before merge)
        make build-bc-local                 # Build bc CLI
        make build-bcd-local                # Build bcd server
        make test-go                        # Go tests
        make test-ts                        # All TS tests
        make lint-go                        # golangci-lint
        make vet-ts                         # Typecheck all TS
        make deploy-bcd-local               # Deploy locally on :9374
        ```

        ### Labels (apply before starting work)
        - **Team**: `team:api`, `team:ui`, or `team:infra`
        - **Size**: `size:quick`, `size:small`, `size:medium`, `size:large`, or `size:xlarge`
        - **Priority** (if urgent): `priority:critical`, `priority:high`, `priority:medium`

        ### Conventions
        - Conventional commits: `feat: <description>`
        - Branch: `feat/<issue-number>-<short-desc>`

        </details>
