name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see in bc.

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What problem does this solve? What should the end state look like?
      placeholder: "e.g. 'Agents should be able to communicate via shared channels without polling'"
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Any technical constraints, compatibility requirements, or non-goals.
      placeholder: "e.g. 'Must work with both tmux and Docker runtimes'"

  - type: textarea
    id: references
    attributes:
      label: References
      description: Related files, packages, prior art, documentation, or linked issues.

  - type: dropdown
    id: size
    attributes:
      label: Estimated Size
      description: How large is this change?
      options:
        - "Quick (< 100 LOC, trivial change, no subagents)"
        - "Small (< 1000 LOC, single PR)"
        - "Medium (2-5 PRs)"
        - "Large (needs design doc first)"
        - "XLarge (needs scoping, skip implementation)"
    validations:
      required: true

  - type: textarea
    id: done-when
    attributes:
      label: Done When
      description: Acceptance criteria for this feature.
      value: |
        - [ ] Feature implemented with tests
        - [ ] `make ci-local` passes
        - [ ] PR reviewed and merged
    validations:
      required: true

  - type: textarea
    id: agent-instructions
    attributes:
      label: Agent Instructions
      description: |
        Workflow for agents picking up this issue. You may leave this as-is.
      value: |
        <details>
        <summary>Agent Workflow (click to expand)</summary>

        ### Test Plan

        Every feature PR must include:
        1. Unit tests for new logic
        2. Integration test if touching API/CLI
        3. Verification all existing tests still pass

        ```bash
        make ci-local       # Full CI pipeline locally
        ```

        ### Workflow by Size (recursive — each level decomposes into the next)

        **QUICK** — < 100 LOC, trivial change
        - Branch, implement, `make ci-local` (MUST PASS), PR, review (using plugins), merge.
        - No subagents needed.

        **SMALL** — < 1000 LOC, single PR
        - Branch: `feat/<issue-number>-<short-desc>`
        - Implement and test
        - `make ci-local` as background task
        - Open PR → `/code-review` → wait for ci-local: pass → merge, fail → fix and repeat

        **MEDIUM** — 2-5 PRs, decomposes into SMALL
        - Break into todos with dependency order
        - Assign each todo to a subagent (each follows SMALL workflow)
        - Merge subagent branches to `feat/<issue-number>-<short-desc>`
        - Open PR → `/code-review` → wait for ci-local: pass → merge, fail → repeat

        **LARGE** — needs design doc, decomposes into MEDIUM
        - Use 5 subagents to thoroughly review codebase, related PRs, issues
        - Use 5 subagents to research the internet for related information
        - Write crisp, detailed design doc as GitHub comment
        - Get approval (STUCK until approved)
        - Break into MEDIUM sub-issues → follow MEDIUM workflow

        **XLARGE** — needs scoping, decomposes into LARGE
        - Do not implement directly
        - Use 10 agents to research codebase and internet, add comment with findings
        - Break into LARGE sub-issues with clear scope
        - Each LARGE sub-issue follows LARGE workflow (design doc → MEDIUM → SMALL)

        ### Key Commands

        **Go (backend)**
        ```bash
        make build-bc-local                 # Build bc CLI
        make build-bcd-local                # Build bcd server (embeds web UI)
        make test-go                        # Run Go tests
        make lint-go                        # golangci-lint
        go test -race -run TestName ./pkg/  # Run specific test
        ```

        **TypeScript (frontend)**
        ```bash
        make build-web-local                # Build web UI
        make build-tui-local                # Build TUI
        make test-web                       # Run web tests (vitest)
        make test-tui                       # Run TUI tests
        make lint-ts                        # Lint all TS
        make vet-ts                         # Typecheck all TS
        ```

        **Deploy & verify**
        ```bash
        make deploy-bcd-local               # Deploy locally on :9374
        make deploy-bcd-local ENV=dogfood   # Deploy dogfood on :9000
        ```

        ### Labels (apply before starting work)
        - **Team**: `team:api`, `team:ui`, or `team:infra`
        - **Size**: `size:quick`, `size:small`, `size:medium`, `size:large`, or `size:xlarge`
        - **Priority** (if urgent): `priority:critical`, `priority:high`, `priority:medium`

        ### Conventions
        - Conventional commits: `feat: <description>`
        - Branch: `feat/<issue-number>-<short-desc>`
        - Makefile naming: `<verb>-<component>[-<runtime>]`

        </details>
