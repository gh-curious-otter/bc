name: Epic
description: Tracking issue for a large initiative with multiple sub-issues
labels: [epic]

body:
  - type: markdown
    attributes:
      value: |
        Use this template for initiatives spanning multiple PRs or sub-issues.

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: High-level objective. What does success look like?
    validations:
      required: true

  - type: textarea
    id: sub-issues
    attributes:
      label: Sub-Issues
      description: Checklist of sub-issues in dependency/priority order. Link issues as they are created.
      value: |
        - [ ] #000 -- Description (dependency: none)
        - [ ] #000 -- Description (dependency: #000)
        - [ ] #000 -- Description (dependency: #000)
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Design docs, related issues, external links, relevant code paths.

  - type: textarea
    id: done-when
    attributes:
      label: Done When
      description: Criteria for closing this epic.
      value: |
        - [ ] All sub-issues completed and merged
        - [ ] Integration tested end-to-end
        - [ ] `make ci-local` passes on main after all merges
        - [ ] Documentation updated if applicable
    validations:
      required: true

  - type: textarea
    id: agent-instructions
    attributes:
      label: Agent Instructions
      description: |
        Workflow for agents picking up this epic. You may leave this as-is.
      value: |
        <details>
        <summary>Agent Workflow (click to expand)</summary>

        ### Epics always start with design

        **Phase 1: Design**
        - Research the problem (search codebase, read docs)
        - Write a design doc as a GitHub comment:
          - Architecture and approach
          - Alternatives considered
          - Component breakdown
          - Sub-issues in priority order
        - Get approval before implementing

        **Phase 2: Break Down**
        - Create sub-issues in dependency order
        - Tag each sub-issue as Small/Medium/Large
        - Each sub-issue should be Small (single PR) when possible

        **Phase 3: Execute**
        - Work sub-issues in dependency order
        - Each sub-issue: branch → implement → `make check` → PR → `/code-review` → merge
        - Update this epic's checklist as sub-issues close

        ### Quality Gates

        ```bash
        make ci-local       # Full CI pipeline (go + ts)
        make check          # Quality gate (go + ts)
        make ci-docker      # Build all Docker images
        ```

        ### Key Commands

        ```bash
        # Go
        make build-go-local                 # Build all Go binaries
        make test-go                        # Run Go tests
        make lint-go                        # golangci-lint

        # TypeScript
        make build-ts-local                 # Build all TS packages
        make test-ts                        # Run all TS tests
        make vet-ts                         # Typecheck all TS

        # Deploy & verify
        make deploy-bcd-local               # Local on :9374
        make deploy-bcd-local ENV=dogfood   # Dogfood on :9000
        ```

        ### Conventions
        - Branch: `feat/` or `fix/` prefix
        - Conventional commits format
        - `make ci-local` must pass before merge

        </details>
