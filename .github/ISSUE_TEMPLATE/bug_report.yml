name: Bug Report
description: Something isn't working as expected
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.

  - type: textarea
    id: symptoms
    attributes:
      label: Symptoms
      description: What happened? Be specific about the error or unexpected behavior.
      placeholder: "e.g. 'bc agent start' exits with panic when no tmux session exists"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Related files, log output, config snippets, screenshots, or linked issues.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low (cosmetic, workaround exists)
        - Medium (broken feature, workaround exists)
        - High (broken feature, no workaround)
        - Critical (data loss, security, crash)
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Estimated Size
      options:
        - "Quick (< 100 LOC, trivial fix, no subagents)"
        - "Small (< 1000 LOC, single PR)"
        - "Medium (2-5 PRs)"
        - "Large (needs design doc first)"
        - "XLarge (needs scoping, skip implementation)"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Go version, bc version, runtime (tmux/Docker), provider"
      placeholder: "macOS 14, Go 1.25.4, bc 0.8.0, tmux, claude"

  - type: textarea
    id: agent-instructions
    attributes:
      label: Agent Instructions
      description: |
        Workflow for agents picking up this issue. You may leave this as-is.
      value: |
        <details>
        <summary>Agent Workflow (click to expand)</summary>

        ### Test Plan

        Every bug fix PR must include:
        1. A failing test that reproduces the bug
        2. The fix
        3. Verification the test now passes

        ```bash
        # Verify before opening PR
        make ci-local          # Full quality gate (go + ts)
        make ci-local       # Full CI pipeline locally
        ```

        ### Workflow by Size

        **QUICK** — < 100 LOC, trivial fix
        - Branch, fix, `make ci-local`, PR, merge. No subagents needed.

        **SMALL** — < 1000 LOC, single PR
        - Branch: `fix/<issue-number>-<short-desc>`
        - Implement fix with test
        - `make ci-local` must pass
        - Open PR → `/code-review` → merge

        **MEDIUM** — 2-5 PRs
        - Break into sub-issues with dependency order
        - Each sub-issue follows SMALL workflow
        - Merge in dependency order

        **LARGE** — needs design doc
        - Write design doc as GitHub comment first
        - Get approval before implementing
        - Then follow MEDIUM workflow

        **XLARGE** — needs scoping
        - Do NOT implement. Add concrete sub-issues with acceptance criteria first.

        ### Key Commands

        ```bash
        make test-go                        # Go tests with race detector
        make test-go-fast                   # Go tests excluding E2E (matches CI)
        make lint-go                        # golangci-lint
        make vet-go                         # go vet
        make build-bc-local                 # Build bc binary
        make build-bcd-local                # Build bcd server
        go test -race -run TestName ./pkg/  # Run specific test
        ```

        ### Labels (apply before starting work)
        - **Team**: `team:api`, `team:ui`, or `team:infra`
        - **Size**: `size:quick`, `size:small`, `size:medium`, `size:large`, or `size:xlarge`
        - **Priority** (if urgent): `priority:critical`, `priority:high`, `priority:medium`

        ### Conventions
        - Conventional commits: `fix: <description>`
        - Branch: `fix/<issue-number>-<short-desc>`
        - All errors handled (errcheck linter enforced)
        - Context propagation (noctx linter enforced)

        </details>
