name: Bug Report
description: Something isn't working as expected
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.

  - type: textarea
    id: symptoms
    attributes:
      label: Symptoms
      description: What happened? Be specific about the error or unexpected behavior.
      placeholder: "e.g. 'bc agent start' exits with panic when no tmux session exists"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Related files, log output, config snippets, screenshots, or linked issues.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low (cosmetic, workaround exists)
        - Medium (broken feature, workaround exists)
        - High (broken feature, no workaround)
        - Critical (data loss, security, crash)
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Estimated Size
      options:
        - "Quick (< 100 LOC, trivial fix)"
        - "Small (< 200 LOC, single PR)"
        - "Medium (2-5 PRs, decomposes into Small)"
        - "Large (needs design doc, decomposes into Medium)"
        - "XLarge (needs scoping, decomposes into Large)"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Go version, bc version, runtime (tmux/Docker), provider"
      placeholder: "macOS 14, Go 1.25.4, bc 0.8.0, tmux, claude"

  - type: textarea
    id: agent-instructions
    attributes:
      label: Agent Instructions
      description: |
        Recursive workflow for agents. You may leave this as-is.
      value: |
        <details>
        <summary>Agent Workflow (click to expand)</summary>

        ### Test Plan (bugs require a failing test first)

        1. Write a failing test that reproduces the bug
        2. Implement the fix
        3. Verify the test passes
        4. `make ci-local` must pass

        ### Recursive Decomposition (each level → next level down)

        **QUICK** — < 100 LOC, trivial fix
        - Branch, fix, `make ci-local` (MUST PASS), PR, review, merge.
        - No subagents needed.

        **SMALL** — < 200 LOC, single PR
        - Branch: `fix/<issue-number>-<short-desc>`
        - Implement fix with failing test first
        - `make ci-local` as background task
        - Open PR → review → ci-local pass → merge, fail → fix and repeat
        - **Escalation**: if scope exceeds 200 LOC or 5 files, STOP and re-classify

        **MEDIUM** — 2-5 PRs, decomposes into Small
        - Break into max 5 todos with dependency order
        - Assign each todo to a subagent (each follows Small workflow)
        - Merge in dependency order

        **LARGE** — needs design doc, decomposes into Medium
        - Use 5 subagents to review codebase + 5 to research internet
        - Write design doc as GitHub comment, get approval (STUCK until approved)
        - Break into max 5 Medium sub-issues

        **XLARGE** — needs scoping, decomposes into Large
        - Use 10 agents to research, post findings, break into max 5 Large sub-issues

        ### Guardrails

        - **Max fan-out**: 5 sub-issues per level
        - **Max depth**: 3 levels
        - **Max retries**: 3 CI fix attempts, then escalate
        - **Escalation**: any agent can promote task size if scope exceeds expectations
        - **Cross-cutting**: shared interface changes must be serialized
        - **Timeouts**: Research 30min, Design 1hr, Small implementation 2hr

        ### Key Commands

        ```bash
        make ci-local                       # Full CI pipeline (MUST PASS)
        make test-go                        # Go tests with race detector
        make lint-go                        # golangci-lint
        make build-bcd-local                # Build bcd server
        go test -race -run TestName ./pkg/  # Run specific test
        ```

        ### Labels (apply before starting work)
        - **Team**: `team:api`, `team:ui`, or `team:infra`
        - **Size**: `size:quick`, `size:small`, `size:medium`, `size:large`, or `size:xlarge`
        - **Priority**: `priority:critical`, `priority:high`, `priority:medium`

        ### Conventions
        - Conventional commits: `fix: <description>`
        - Branch: `fix/<issue-number>-<short-desc>`

        </details>
