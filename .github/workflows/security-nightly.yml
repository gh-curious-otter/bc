name: Nightly Security Scan

on:
  schedule:
    - cron: '0 2 * * *' # 2 AM UTC daily
  workflow_dispatch: # manual trigger

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-nightly
  cancel-in-progress: true

jobs:
  # -- Go Vulnerability Check ------------------------------------------------
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # -- Secret Detection -------------------------------------------------------
  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@cb7149a9b57195b609c63e8518d2c6056677d2d0 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -- CodeQL Analysis --------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:go

  # -- Container Image Scan ---------------------------------------------------
  trivy:
    name: Container Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
      - name: Create missing dirs for Docker build
        run: mkdir -p prompts
      - name: Build bcd image
        run: docker build -t bc-daemon:latest -f docker/Dockerfile.bcd .
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e7b4b18e97b232c4 # v0.29.0
        with:
          image-ref: bc-daemon:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
