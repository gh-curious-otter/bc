name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  GO_VERSION: '1.25'
  BUN_VERSION: '1.2'

jobs:
  # ── Go: Lint ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Create web dist stub for embed
        run: mkdir -p server/web/dist && echo '<!-- stub -->' > server/web/dist/index.html
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          only-new-issues: true

  # ── Go: Fast Tests + Coverage ───────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create web dist stub for embed
        run: mkdir -p server/web/dist && echo '<!-- stub -->' > server/web/dist/index.html

      - name: Run fast tests with race detector and coverage
        run: |
          SLOW="github.com/rpuneet/bc/pkg/tmux github.com/rpuneet/bc/pkg/secret github.com/rpuneet/bc/pkg/doctor github.com/rpuneet/bc/internal/cmd"
          PACKAGES=$(go list ./... | grep -v -F "$(echo $SLOW | tr ' ' '\n')")
          go test -race -coverprofile=coverage.out $PACKAGES

      - name: Check coverage threshold (60%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets 60% threshold (target: 90%+)"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  # ── Go: Full Tests (main only) ─────────────────────────────────────
  test-full:
    name: Test (full)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create web dist stub for embed
        run: mkdir -p server/web/dist && echo '<!-- stub -->' > server/web/dist/index.html

      - name: Run all tests including slow packages
        run: |
          go test -race -timeout 5m $(go list ./... | grep -v /internal/cmd$)

  # ── Go: Security (main only) ─────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
        continue-on-error: true

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── TUI ─────────────────────────────────────────────────────────────
  tui:
    name: TUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: cd tui && bun install
      - name: Build
        run: cd tui && bun run build
      - name: Lint
        run: cd tui && bun run lint
      - name: Test
        run: cd tui && bun test
        continue-on-error: true

  # ── Build gate (fast tests + lint + tui) ─────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint, tui]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build bc binary
        run: make build-release

      - name: Verify binary runs
        run: ./bin/bc version
