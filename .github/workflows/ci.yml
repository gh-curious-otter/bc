name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  GO_VERSION: '1.25'
  BUN_VERSION: '1.2'

jobs:
  # ── Go: Lint ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Create web dist stub for embed
        run: mkdir -p server/web/dist && touch server/web/dist/.gitkeep
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0

  # ── Go: Test + Coverage ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create web dist stub for embed
        run: mkdir -p server/web/dist && touch server/web/dist/.gitkeep

      - name: Run tests with race detector and coverage
        run: make coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  # ── Go: Security (non-blocking) ───────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    # Non-blocking: known Go stdlib vulns until upgrade to 1.25.8
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
        continue-on-error: true

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── TUI: Build + Lint + Test ─────────────────────────────────────────
  tui:
    name: TUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: cd tui && bun install
      - name: Build
        run: cd tui && bun run build
      - name: Lint
        run: cd tui && bun run lint
      - name: Test
        run: cd tui && bun test

  # ── Build gate ───────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint, tui]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build bc binary
        run: make build-release

      - name: Verify binary runs
        run: ./bin/bc version
