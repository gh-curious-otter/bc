name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.8'
  BUN_VERSION: '1.2.15'

jobs:
  # ── Go: Lint ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Create web dist stub for embed
        run: mkdir -p server/web/dist && echo '<!-- stub -->' > server/web/dist/index.html
      - uses: golangci/golangci-lint-action@4afd733a84b2f1a89d091a89e6e683d56e21a2da # v9
        with:
          version: v2.8.0
          only-new-issues: true

  # ── Go: Fast Tests + Coverage ───────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create web dist stub for embed
        run: mkdir -p server/web/dist && echo '<!-- stub -->' > server/web/dist/index.html

      - name: Run fast tests with race detector and coverage
        run: |
          # NOTE: Keep SLOW list in sync with Makefile test-go-fast target
          SLOW="github.com/rpuneet/bc/pkg/tmux github.com/rpuneet/bc/pkg/secret github.com/rpuneet/bc/pkg/doctor github.com/rpuneet/bc/internal/cmd"
          PACKAGES=$(go list ./... | grep -v -F "$(echo $SLOW | tr ' ' '\n')")
          go test -race -coverprofile=coverage.out $PACKAGES

      - name: Check coverage threshold (60%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets 60% threshold (target: 90%+)"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5
        with:
          files: coverage.out
          fail_ci_if_error: true

  # ── Go: Full Tests (main only) ─────────────────────────────────────
  test-full:
    name: Test (full)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create web dist stub for embed
        run: mkdir -p server/web/dist && echo '<!-- stub -->' > server/web/dist/index.html

      - name: Run all tests including slow packages
        run: |
          go test -race -timeout 5m $(go list ./... | grep -v /internal/cmd$)

  # ── Go: Security (main only) ─────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@cb7149a9b57195b609c63e8518d2c6056677d2d0 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── TUI ─────────────────────────────────────────────────────────────
  tui:
    name: TUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: cd tui && bun install
      - name: Build
        run: cd tui && bun run build
      - name: Lint
        run: cd tui && bun run lint
      - name: Test
        run: cd tui && bun test

  # ── Build gate (fast tests + lint + tui) ─────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint, tui]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build release binary
        run: make release-local-bc

      - name: Verify binary runs
        run: ./bin/bc version

  # ── Container Scan (main only) ──────────────────────────────────────
  scan:
    name: Container Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
      - name: Build bcd image
        run: docker build -t bc-daemon:latest -f docker/Dockerfile.bcd .
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e7b4b18e97b232c4 # v0.29.0
        with:
          image-ref: bc-daemon:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
