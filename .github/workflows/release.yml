# Release workflow using GoReleaser
# Triggered on version tags (v*)
# Creates GitHub release with binaries and Homebrew formula

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.25.8'

jobs:
  # ── CI must pass first ───────────────────────────────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ── Linux release (GoReleaser) ──────────────────────────────────────
  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # ── macOS release (native CGO build) ────────────────────────────────
  release-macos:
    name: Release macOS
    runs-on: macos-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build macOS binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"

          # bc — both architectures
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/bc-darwin-amd64 ./cmd/bc
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/bc-darwin-arm64 ./cmd/bc

      - name: Create archives and checksums
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cd dist
          for bin in bc-darwin-*; do
            tar -czvf "${bin%%-darwin-*}_${VERSION}_darwin_${bin##*-}.tar.gz" "$bin"
          done
          shasum -a 256 *.tar.gz > checksums-macos.txt

      - name: Upload to release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            dist/bc_*.tar.gz
            dist/checksums-macos.txt
          fail_on_unmatched_files: false
