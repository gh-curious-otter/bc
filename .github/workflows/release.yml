# Release workflow using GoReleaser
# Triggered on version tags (v*)
# Creates GitHub release with binaries and Homebrew formula

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.25.8'

jobs:
  # ── CI must pass first ───────────────────────────────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ── Linux release (GoReleaser) ──────────────────────────────────────
  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v7
        with:
          distribution: goreleaser
          version: 'v2.8.2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # ── macOS release (native CGO build) ────────────────────────────────
  release-macos:
    name: Release macOS
    runs-on: macos-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build macOS binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"

          # bc — both architectures
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/bc-darwin-amd64 ./cmd/bc
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/bc-darwin-arm64 ./cmd/bc

      - name: Create archives and checksums
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cd dist
          for bin in bc-darwin-*; do
            tar -czvf "${bin%%-darwin-*}_${VERSION}_darwin_${bin##*-}.tar.gz" "$bin"
          done
          shasum -a 256 *.tar.gz > checksums-macos.txt

      - name: Upload to release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2
        with:
          files: |
            dist/bc_*.tar.gz
            dist/checksums-macos.txt
          fail_on_unmatched_files: false
