version: "2"

# golangci-lint configuration
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - bodyclose
    - noctx
    - gosec
    - prealloc

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    govet:
      enable-all: true

    misspell:
      locale: US

    gosec:
      excludes:
        - G104 # Audit errors not checked (we check where needed)

  exclusions:
    rules:
      # Ignore long lines in comments
      - linters:
          - lll
        source: "^//.*"

      # Ignore magic numbers in test files
      - path: _test\.go
        linters:
          - mnd

      # Ignore certain checks in main.go
      - path: cmd/bc/main\.go
        linters:
          - gochecknoglobals

      # TODO: re-evaluate after redesign — queue/beads packages have been removed;
      # keep this exclusion pattern in case channels revamp (#2947) introduces new deprecations
      # - linters:
      #     - staticcheck
      #   text: "SA1019.*pkg/(queue|beads)"

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    gofmt:
      simplify: true

    goimports:
      local-prefixes:
        - github.com/rpuneet/bc

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
