# GoReleaser configuration for bc
# https://goreleaser.com
#
# macOS builds are handled separately in CI (release.yml) due to CGO requirements.
# This config only builds linux/amd64.

version: 2

project_name: bc

before:
  hooks:
    - go mod tidy

builds:
  - id: bc
    main: ./cmd/bc
    binary: bc
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
    goarch:
      - amd64

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE*
      - CHANGELOG*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^feat.*'
      order: 0
    - title: Bug Fixes
      regexp: '^fix.*'
      order: 1
    - title: Refactoring
      regexp: '^refactor.*'
      order: 2
    - title: Performance
      regexp: '^perf.*'
      order: 3
    - title: Others
      order: 999

release:
  github:
    owner: rpuneet
    name: bc
  draft: false
  prerelease: auto
  mode: append
  header: |
    ## bc {{ .Tag }}

    Orchestration for AI agents.
  footer: |
    ---

    **Full Changelog**: https://github.com/rpuneet/bc/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
  - name: bc
    repository:
      owner: rpuneet
      name: homebrew-bc
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: main
    directory: Formula
    homepage: https://github.com/rpuneet/bc
    description: Orchestration for AI agents
    license: MIT
    # Homebrew publish is gated by --skip=homebrew in release.yml when token not set
    skip_upload: auto
    install: |
      bin.install "bc"
    test: |
      system "#{bin}/bc", "version"
