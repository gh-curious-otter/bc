# User-Level bc Configuration (~/.bcrc)
#
# This file provides user-level defaults that apply to all bc workspaces.
# Place this file at ~/.bcrc to set your personal preferences.
#
# Settings here are merged with workspace config.toml, with workspace
# settings taking precedence.
#
# Usage:
#   1. Copy this file: cp bcrc.toml ~/.bcrc
#   2. Edit with your preferences
#   3. Settings apply to all your bc workspaces

[user]
# Your default display name in channel messages
# This is shown when you send messages via bc channel send
nickname = "@alice"

[defaults]
# Default role when creating agents without specifying --role
default_role = "engineer"

# Automatically start root agent on 'bc up'
auto_start_root = true

# Default tool to use
default_tool = "claude-code"

[tools]
# Your preferred AI tools configuration
# These settings are used unless overridden by workspace config

[tools.claude-code]
enabled = true
# Your preferred model
model = "claude-sonnet-4-20250514"

[tools.github]
enabled = true
# Your GitHub username (for @mention suggestions)
username = "alice"

[performance]
# Personal performance preferences
# Adjust these based on your machine and network

# Polling intervals (ms) - increase on slower machines
adaptive_fast_interval = 1000
adaptive_normal_interval = 3000
adaptive_slow_interval = 10000

[tui]
# TUI appearance preferences
theme = "default"
# "auto", "always", or "never"
color_mode = "auto"

[editor]
# Preferred editor for 'bc config edit' and similar commands
# Falls back to $EDITOR environment variable if not set
command = "code"
# Editor arguments
args = ["--wait"]
