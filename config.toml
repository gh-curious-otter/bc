# bc Configuration
# This is the default configuration template for bc workspaces.
# When you run `bc init`, a copy is created at .bc/config.toml
# Run `go generate ./...` to regenerate config/config.go from this file

# =============================================================================
# Workspace Settings
# =============================================================================
[workspace]
# Workspace name - typically your project name
name = "bc"

# Config schema version (DO NOT CHANGE unless migrating)
version = 2

# Workspace root path (set automatically on init)
path = ""

# =============================================================================
# AI Providers
# =============================================================================
[providers]
# Default provider for new agents
default = "claude"

[providers.claude]
# Add --dangerously-skip-permissions if you want agents to run without approval prompts
command = "claude"
enabled = true

[providers.gemini]
command = "gemini --yolo"
enabled = true

[providers.cursor]
command = "cursor-agent --force --print"
enabled = false

[providers.codex]
command = "codex --full-auto"
enabled = false

[providers.opencode]
command = "crush"
enabled = false

[providers.openclaw]
command = "openclaw --auto"
enabled = false

[providers.aider]
command = "aider --yes"
enabled = false

# =============================================================================
# External Services
# =============================================================================
[services]

[services.github]
command = "gh"
enabled = false

[services.gitlab]
command = "glab"
enabled = false

[services.jira]
command = "jira"
enabled = false

# =============================================================================
# Session Logging
# =============================================================================
[logs]
# Directory for persistent session logs (relative to workspace root)
# Each agent gets a log file streamed via tmux pipe-pane
path = ".bc/logs"

# Maximum log file size in bytes before lazy truncation (keeps last half)
max_bytes = 1048576  # 1MB

# Preserve ANSI escape codes in log files (for colored output in peek/TUI)
preserve_ansi = true

# =============================================================================
# Tmux Settings
# =============================================================================
[tmux]
session_prefix = "bc-"

# =============================================================================
# Runtime Settings
# =============================================================================
[runtime]
# Backend for agent sessions: "tmux" or "docker" (default)
backend = "docker"

[runtime.docker]
# Docker image for agent containers
image = "bc-agent:latest"
# CPU limit per container (fractional cores)
cpus = 2.0
# Memory limit per container in MB
memory_mb = 2048
# Docker network mode
network = "bridge"
# Extra volume mounts (host:container:mode)
# extra_mounts = ["/data:/data:ro"]

# =============================================================================
# Performance Settings
# =============================================================================
[performance]
# TUI polling intervals in milliseconds (min: 500ms)
# Lower values = more responsive but higher CPU usage
poll_interval_agents = 2000      # Agent status updates
poll_interval_channels = 3000    # Channel message polling
poll_interval_costs = 5000       # Cost data refresh
poll_interval_status = 2000      # Dashboard status
poll_interval_logs = 3000        # Log viewer refresh
poll_interval_teams = 10000      # Team data refresh
poll_interval_demons = 5000      # Scheduled tasks refresh

# Cache TTLs in milliseconds
# Higher values = less subprocess calls but potentially stale data
cache_ttl_tmux = 2000            # Tmux session state cache
cache_ttl_commands = 5000        # CLI command result cache

# Adaptive polling thresholds (for useAdaptivePolling hook)
adaptive_fast_interval = 1000    # When agents are actively working
adaptive_normal_interval = 2000  # Normal operation
adaptive_slow_interval = 4000    # Low activity period
adaptive_max_interval = 8000     # Maximum backoff interval

# =============================================================================
# TUI Settings
# =============================================================================
[tui]
# Theme selection: "dark", "light", "auto" (follows terminal)
theme = "auto"

# Scroll speed (1-10, higher = faster scrolling)
scroll_speed = 3

# Enable macOS-style scroll acceleration
scroll_acceleration = false

# Leader key for advanced commands (Ctrl+X by default)
# Sequence: Press leader key, then command key
# Example: Ctrl+X followed by 'h' opens help
leader_key = "ctrl+x"

# Leader key bindings (key -> action mapping)
# Actions: help, themes, sessions, export, new_session, quit
[tui.leader_bindings]
h = "help"          # Ctrl+X h -> Show help
t = "themes"        # Ctrl+X t -> Theme selector
s = "sessions"      # Ctrl+X s -> Session list
x = "export"        # Ctrl+X x -> Export session
n = "new_session"   # Ctrl+X n -> New session
q = "quit"          # Ctrl+X q -> Quit

# =============================================================================
# Database Settings
# =============================================================================
[database]
# Database driver: "sqlite" (default, zero-config) or "postgres"
driver = "sqlite"

# Connection URL:
#   sqlite  — file path relative to .bc/ (default: "" uses per-store files like channels.db, costs.db)
#   postgres — postgresql://user:pass@host:5432/dbname?sslmode=disable
url = ""

# Maximum open connections (postgres only; sqlite always uses 1)
max_open_conns = 10

# Maximum idle connections (postgres only)
max_idle_conns = 5
