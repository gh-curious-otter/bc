# bc configuration
# This file defines the default configuration schema.
# Run `go generate ./...` to regenerate config/config.go

# Application metadata
name = "bc"
version = "0.1.0"

# Workspace settings
[workspace]
state_dir = ".bc"              # Directory for bc state (relative to project root)
max_workers = 3                # Maximum number of worker agents

# Agent settings
# For Cursor Agent: use --force (no confirmations) and --print (headless, full tool access like Claude Code).
# Then bc send and Enter will work; agents run non-interactively with all permissions.
[agent]
command = "cursor-agent --force --print"
coordinator_name = "coordinator"                    # Name for the coordinator agent
worker_prefix = "worker"                           # Prefix for worker agent names

# Tmux settings
[tmux]
session_prefix = "bc-"         # Prefix for all tmux session names

# TUI settings
[tui]
refresh_interval = "2s"        # How often to refresh agent status
theme = "ayu-dark"             # Color theme (ayu-dark, nord, etc.)

# Cost tracking
[costs]
enabled = true                 # Enable cost tracking
warn_threshold = 10.0          # Warn when session cost exceeds this (USD)
limit = 100.0                  # Hard limit per session (USD), 0 = no limit

# Supported agent types (for future use)
[[agents]]
name = "claude"
command = "claude --dangerously-skip-permissions"
description = "Anthropic Claude Code"

[[agents]]
name = "cursor"
command = "cursor-agent --force"
description = "Cursor Agent (all permissions)"

[[agents]]
name = "cursor-agent"
command = "cursor-agent --force --print"
description = "Cursor Agent (headless, all permissions, stdin/Enter submits)"

[[agents]]
name = "codex"
command = "codex --full-auto"
description = "OpenAI Codex"

[[agents]]
name = "server"
command = "claude mcp serve"
description = "Claude MCP Server"

# Role definitions with system prompts
# Roles define agent behavior and available commands

[[roles]]
name = "product_manager"
prompt_file = "prompts/product_manager.md"
description = "Defines product vision, creates epics, reviews proposals"
permissions = ["queue.add", "queue.view", "send", "report"]

[[roles]]
name = "manager"
prompt_file = "prompts/manager.md"
description = "Breaks down epics, spawns engineers, assigns work, reviews code"
permissions = ["queue.add", "queue.assign", "queue.complete", "spawn", "send", "report", "git.merge"]

[[roles]]
name = "engineer"
prompt_file = "prompts/engineer.md"
description = "Implements assigned tasks, writes code and tests"
permissions = ["queue.view", "report", "git.branch", "git.commit"]
