# bc Configuration
# This is the default configuration template for bc workspaces.
# When you run `bc init`, a copy is created at .bc/config.toml
# Run `go generate ./...` to regenerate config/config.go from this file

# =============================================================================
# Workspace Settings
# =============================================================================
[workspace]
# Workspace name - typically your project name
name = "bc"

# Config schema version (DO NOT CHANGE unless migrating)
version = 2

# =============================================================================
# Git Worktrees
# =============================================================================
[worktrees]
# Directory for agent-specific git worktrees (relative to workspace root)
# Each agent gets an isolated worktree to prevent merge conflicts
path = ".bc/worktrees"

# Automatically cleanup worktrees when agents are stopped
auto_cleanup = true

# =============================================================================
# AI Tools Configuration
# =============================================================================
[tools]
# Default tool to use when spawning agents (must be defined below)
# Options: "claude", "cursor", "codex", or custom tool name
default = "claude"

# Claude Code (Anthropic) - Recommended default
[tools.claude]
command = "claude --dangerously-skip-permissions"
enabled = true

# Gemini (Google) - YOLO mode
[tools.gemini]
command = "gemini --yolo"
enabled = true

# Cursor Agent - Alternative option
[tools.cursor]
command = "cursor-agent --force --print"
enabled = false

# OpenAI Codex - Alternative option
[tools.codex]
command = "codex --full-auto"
enabled = false

# OpenCode/Crush - Charmbracelet's AI coding assistant
# Note: OpenCode was archived, Crush is the successor
[tools.opencode]
command = "crush"
enabled = false

# GitHub integration - for issue tracking and PR management
[tools.github]
command = "gh"
enabled = false

# GitLab integration - for GitLab instance integration
[tools.gitlab]
command = "glab"
enabled = false

# Jira integration - for issue tracking with Jira
[tools.jira]
command = "jira"
enabled = false

# Custom tools can be added here
# [tools.custom_name]
# command = "your-agent-command"
# enabled = true

# =============================================================================
# Agent Memory System
# =============================================================================
[memory]
# Memory backend type: "file" (default), "sqlite" (future)
backend = "file"

# Directory for agent memory, experiences, and learnings
path = ".bc/memory"

# =============================================================================
# Communication Channels
# =============================================================================
[channels]
# Default channels created on workspace initialization
# Agents can be added to channels for group messaging
default = ["general", "engineering"]

# =============================================================================
# Default Agent Roster (for `bc up`)
# =============================================================================
[roster]
# Number of engineer agents to spawn (0-10)
# Engineers implement tasks, write code, and run tests
engineers = 4

# Number of tech-lead agents to spawn (0-10)
# Tech leads review code, manage engineers, and coordinate work
tech_leads = 2

# Number of QA agents to spawn (0-10)
# QA agents test features and verify quality
qa = 2

# =============================================================================
# Tmux Settings
# =============================================================================
[tmux]
session_prefix = "bc-"

# =============================================================================
# Performance Settings (Phase 5 - Epic #962)
# =============================================================================
[performance]
# TUI polling intervals in milliseconds (min: 500ms)
# Lower values = more responsive but higher CPU usage
poll_interval_agents = 2000      # Agent status updates
poll_interval_channels = 3000    # Channel message polling
poll_interval_costs = 5000       # Cost data refresh
poll_interval_status = 2000      # Dashboard status
poll_interval_logs = 3000        # Log viewer refresh
poll_interval_teams = 10000      # Team data refresh
poll_interval_demons = 5000      # Scheduled tasks refresh

# Cache TTLs in milliseconds
# Higher values = less subprocess calls but potentially stale data
cache_ttl_tmux = 2000            # Tmux session state cache
cache_ttl_commands = 5000        # CLI command result cache

# Adaptive polling thresholds (for useAdaptivePolling hook)
adaptive_fast_interval = 1000    # When agents are actively working
adaptive_normal_interval = 2000  # Normal operation
adaptive_slow_interval = 4000    # Low activity period
adaptive_max_interval = 8000     # Maximum backoff interval

# =============================================================================
# TUI Settings
# =============================================================================
[tui]
# Theme selection: "dark", "light", "auto" (follows terminal)
theme = "auto"

# Scroll speed (1-10, higher = faster scrolling)
scroll_speed = 3

# Enable macOS-style scroll acceleration
scroll_acceleration = false

# Leader key for advanced commands (Ctrl+X by default)
# Sequence: Press leader key, then command key
# Example: Ctrl+X followed by 'h' opens help
leader_key = "ctrl+x"

# Leader key bindings (key -> action mapping)
# Actions: help, themes, sessions, export, new_session, quit
[tui.leader_bindings]
h = "help"          # Ctrl+X h -> Show help
t = "themes"        # Ctrl+X t -> Theme selector
s = "sessions"      # Ctrl+X s -> Session list
x = "export"        # Ctrl+X x -> Export session
n = "new_session"   # Ctrl+X n -> New session
q = "quit"          # Ctrl+X q -> Quit

# =============================================================================
# Agent Defaults (internal use)
# =============================================================================
[agent_legacy]
command = "claude --dangerously-skip-permissions"

# =============================================================================
# Agent Type Definitions (for bc agent create --tool)
# =============================================================================
[[agents]]
name = "claude"
command = "claude --dangerously-skip-permissions"
description = "Anthropic Claude Code"

[[agents]]
name = "gemini"
command = "gemini --yolo"
description = "Gemini Agent"

[[agents]]
name = "cursor"
command = "cursor-agent --force --print"
description = "Cursor Agent"

[[agents]]
name = "codex"
command = "codex --full-auto"
description = "OpenAI Codex"

[[agents]]
name = "opencode"
command = "crush"
description = "OpenCode/Crush AI coding assistant"
