# bc Configuration
# This is the default configuration template for bc workspaces.
# When you run `bc init`, a copy is created at .bc/config.toml
# Run `go generate ./...` to regenerate config/config.go from this file

# =============================================================================
# Workspace Settings
# =============================================================================
[workspace]
# Workspace name - typically your project name
name = "bc"

# Config schema version (DO NOT CHANGE unless migrating)
version = 2

# =============================================================================
# Git Worktrees
# =============================================================================
[worktrees]
# Directory for agent-specific git worktrees (relative to workspace root)
# Each agent gets an isolated worktree to prevent merge conflicts
path = ".bc/worktrees"

# Automatically cleanup worktrees when agents are stopped
auto_cleanup = true

# =============================================================================
# AI Tools Configuration
# =============================================================================
[tools]
# Default tool to use when spawning agents (must be defined below)
# Options: "claude", "cursor", "codex", or custom tool name
default = "claude"

# Claude Code (Anthropic) - Recommended default
[tools.claude]
command = "claude --dangerously-skip-permissions"
enabled = true

# Gemini (Google) - YOLO mode
[tools.gemini]
command = "gemini --yolo"
enabled = true

# Cursor Agent - Alternative option
[tools.cursor]
command = "cursor-agent --force --print"
enabled = false

# OpenAI Codex - Alternative option
[tools.codex]
command = "codex --full-auto"
enabled = false

# Custom tools can be added here
# [tools.custom_name]
# command = "your-agent-command"
# enabled = true

# =============================================================================
# Agent Memory System
# =============================================================================
[memory]
# Memory backend type: "file" (default), "sqlite" (future)
backend = "file"

# Directory for agent memory, experiences, and learnings
path = ".bc/memory"

# =============================================================================
# Communication Channels
# =============================================================================
[channels]
# Default channels created on workspace initialization
# Agents can be added to channels for group messaging
default = ["general", "engineering"]

# =============================================================================
# Default Agent Roster (for `bc up`)
# =============================================================================
[roster]
# Number of engineer agents to spawn (0-10)
# Engineers implement tasks, write code, and run tests
engineers = 4

# Number of tech-lead agents to spawn (0-10)
# Tech leads review code, manage engineers, and coordinate work
tech_leads = 2

# Number of QA agents to spawn (0-10)
# QA agents test features and verify quality
qa = 2

# =============================================================================
# Tmux Settings
# =============================================================================
[tmux]
session_prefix = "bc-"

# =============================================================================
# Agent Defaults (internal use)
# =============================================================================
[agent_legacy]
command = "claude --dangerously-skip-permissions"

# =============================================================================
# Agent Type Definitions (for bc agent create --tool)
# =============================================================================
[[agents]]
name = "claude"
command = "claude --dangerously-skip-permissions"
description = "Anthropic Claude Code"

[[agents]]
name = "gemini"
command = "gemini --yolo"
description = "Gemini Agent"

[[agents]]
name = "cursor"
command = "cursor-agent --force --print"
description = "Cursor Agent"

[[agents]]
name = "codex"
command = "codex --full-auto"
description = "OpenAI Codex"
