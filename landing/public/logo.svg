<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;family=Space+Mono:wght@400');
    .cursor { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
  <!-- Terminal prompt -->
  <text x="0" y="38" font-family="'Space Mono',monospace" font-weight="400" font-size="36" fill="#FB923C">&gt;</text>
  <!-- Space after prompt -->
  <text x="28" y="38" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="44" letter-spacing="-2" fill="#EA580C">bc</text>
  <!-- Blinking cursor -->
  <text x="90" y="38" font-family="'Space Mono',monospace" font-weight="400" font-size="44" fill="#FB923C" class="cursor">_</text>
</svg>
